<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gracias — MAC IA AGENT</title>
  <meta name="robots" content="noindex" />
  <style>
    :root{
      --bg0:#04050a; --bg1:#070812;
      --text:#f4f7ff; --muted:#a9b1c6;
      --accent:#4fc3ff; --accent2:#bfe9ff;
      --line: rgba(255,255,255,.10);
      --r28:28px; --ease: cubic-bezier(.2,.9,.2,1);
      --max: 980px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 720px at 78% -10%, rgba(79,195,255,.20), transparent 60%),
        radial-gradient(1000px 600px at 10% 10%, rgba(191,233,255,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, #03040a);
    }
    a{color:inherit; text-decoration:none}
    .container{width:min(var(--max), 92vw); margin:0 auto; padding:48px 0}
    .card{
      border-radius: var(--r28);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      padding: 26px;
      box-shadow: 0 30px 120px rgba(0,0,0,.62);
    }
    h1{margin:0 0 10px; font-size: 40px; letter-spacing:-.8px}
    p{margin:0; color:var(--muted); line-height:1.7}
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(79,195,255,.45);
      background: linear-gradient(90deg, rgba(79,195,255,.96), rgba(191,233,255,.86));
      color:#061019;
      font-weight:900;
      margin-top: 16px;
      transition: .22s var(--ease);
    }
    .btn:hover{ transform: translateY(-2px); }
    .small{margin-top:10px; font-size:12px; color:rgba(244,247,255,.75)}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Gracias ✅</h1>
      <p>Hemos recibido tu solicitud. Te contactaremos lo antes posible.</p>
      <a class="btn" href="./">Volver a la web</a>
      <div class="small">Si quieres acelerar, escríbenos por WhatsApp.</div>
    </div>
  </div>
</body>
</html>
