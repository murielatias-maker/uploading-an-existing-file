<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gracias | MAC IA AGENT</title>
  <meta name="robots" content="noindex" />
  <style>
    :root{
      --bg0:#06121d;--bg1:#0b1c2a;
      --text:#f4f7ff;--muted:#a9b1c6;
      --accent-rgb:76,201,240;--accent2-rgb:189,239,255;
      --line: rgba(255,255,255,.10);
      --r28:28px; --ease: cubic-bezier(.2,.9,.2,1);
      --max: 980px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 50% -10%, rgba(var(--accent-rgb), .18), transparent 60%),
        radial-gradient(1000px 600px at 10% 10%, rgba(var(--accent2-rgb), .10), transparent 55%),
        linear-gradient(180deg,var(--bg0),var(--bg1) 55%, #03040a);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(var(--max), 92vw);
      border-radius: var(--r28);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      padding: 26px;
      box-shadow: 0 30px 120px rgba(0,0,0,.62);
    }
    h1{margin:0 0 10px; font-size: 36px; letter-spacing:-.6px}
    p{margin:0 0 18px; color:var(--muted); line-height:1.7}
    .row{display:flex; gap:10px; flex-wrap:wrap}
    a{
      display:inline-flex; align-items:center; justify-content:center;
      padding: 11px 14px;
      border-radius: 999px;
      border:1px solid rgba(var(--accent-rgb), .35);
      background: rgba(var(--accent-rgb), .10);
      color: var(--text);
      text-decoration:none;
      transition: .2s ease;
    }
    a:hover{transform: translateY(-1px); box-shadow: 0 0 0 8px rgba(var(--accent-rgb), .10)}
    .primary{
      border-color: rgba(var(--accent-rgb), .45);
      background: linear-gradient(90deg, rgba(var(--accent-rgb), .98), rgba(var(--accent2-rgb), .88));
      color:#06121d;
      font-weight:900;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>¡Gracias! ✅</h1>
    <p>Hemos recibido tu mensaje correctamente. Te contactaremos lo antes posible.</p>
    <div class="row">
      <a class="primary" href="./">Volver a la web</a>
      <a href="https://wa.me/34663432481" target="_blank" rel="noopener">WhatsApp</a>
    </div>
  </div>
</body>
</html>
