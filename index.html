<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MAC IA AGENT — IA & Automatización Tech-Luxury para Implantes</title>

<style>
:root{
  --bg0:#06121d;
  --bg1:#0b1c2a;
  --text:#f4f7ff;
  --muted:#a9b1c6;
  --accent:#4cc9f0;
  --accent2:#bdefff;
  --accent-rgb:76,201,240;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(1200px 720px at 78% -10%, rgba(76,201,240,.22), transparent 60%),
    linear-gradient(180deg,var(--bg0),var(--bg1));
}

.container{width:min(1100px,92vw);margin:auto}
section{padding:60px 0}
h1{font-size:52px;margin:0 0 20px}
h2{margin-bottom:20px}
p{color:var(--muted);line-height:1.7}

.btn{
  display:inline-block;
  padding:12px 18px;
  border-radius:999px;
  text-decoration:none;
  background:linear-gradient(90deg,#4cc9f0,#bdefff);
  color:#06121d;
  font-weight:600;
  border:none;
}

form{display:grid;gap:15px;margin-top:20px}
input,textarea{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);
  color:white;
}
textarea{min-height:120px}

footer{
  padding:30px 0;
  text-align:center;
  border-top:1px solid rgba(255,255,255,.1);
  color:var(--muted);
}
</style>
</head>

<body>

<section>
<div class="container">
<h1>MAC IA AGENT</h1>
<p>IA avanzada y automatización para clínicas de implantes. Más primeras visitas. Menos fugas.</p>
<a class="btn" href="#contacto">Solicitar auditoría</a>
</div>
</section>

<section id="contacto">
<div class="container">
<h2>Contacto</h2>
<p>Envíanos tu información y te respondemos rápidamente.</p>

<form name="contacto"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      action="/gracias.html">

<input type="hidden" name="form-name" value="contacto">

<!-- Anti spam invisible -->
<p style="display:none">
  <label>No rellenar: <input name="bot-field"></label>
</p>

<input type="text" name="nombre" placeholder="Nombre" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="clinica" placeholder="Clínica / Ciudad">
<textarea name="mensaje" placeholder="Tu mensaje..." required></textarea>

<button class="btn" type="submit">Enviar</button>

</form>

</div>
</section>

<footer>
© <span id="year"></span> MAC IA AGENT ·
<a href="/privacidad.html" style="color:#fff;">Política de Privacidad</a>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
